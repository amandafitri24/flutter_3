name: flutter_3
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Package untuk membuat icon aplikasi secara otomatis
  flutter_launcher_icons: ^0.13.1

# Konfigurasi Icon Aplikasi
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/assets/logoA.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/assets/logoA.png"

flutter:
  uses-material-design: true

  assets:
    - assets/assets/